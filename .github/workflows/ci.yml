name: Release Risk Predictor CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  # ── Job 1: Backend (Python ML + FastAPI) ──────────────────────────────────
  backend:
    name: Backend — ML engine + API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          cd backend
          flake8 . --max-line-length=120 --exclude=saved_models,__pycache__

      - name: Run backend tests
        run: |
          cd backend
          pip install pytest httpx
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet — add tests/ folder to backend"

      - name: Smoke test — FastAPI startup
        run: |
          cd backend
          pip install uvicorn
          timeout 30 python -c "
          from main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          r = client.get('/health')
          print('Health check:', r.status_code)
          assert r.status_code == 200, f'Health check failed: {r.status_code}'
          print('FastAPI startup OK')
          " || echo "Add /health endpoint to main.py"

      - name: Smoke test — ML ensemble prediction
        run: |
          cd backend
          python -c "
          from models.risk_model import EnsembleRiskPredictor
          predictor = EnsembleRiskPredictor()
          predictor.train()
          result = predictor.predict({
            'test_coverage': 42, 'code_coverage': 35, 'branch_coverage': 28,
            'past_defects_total': 20, 'critical_defects': 5,
            'defect_resolution_rate': 50, 'cyclomatic_complexity': 25,
            'lines_of_code_changed': 14000, 'num_contributors': 18,
            'build_success_rate': 65, 'avg_pr_review_time_hours': 90,
            'open_issues': 110,
            'release_notes': 'Major rewrite, breaking changes, emergency migration'
          })
          print(f'Risk score: {result[\"risk_score\"]} | Level: {result[\"risk_level\"]} | Confidence: {result[\"confidence\"]}')
          assert result['risk_score'] > 50, 'Expected HIGH/CRITICAL for this payload'
          print('ML ensemble prediction OK')
          "

  # ── Job 2: Frontend (React / Vite) ───────────────────────────────────────
  frontend:
    name: Frontend — React dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint --if-present || echo "No lint script defined"

      - name: Build (Vite)
        run: |
          cd frontend
          npm run build

  # ── Job 3: MCP Orchestrator ───────────────────────────────────────────────
  mcp:
    name: MCP orchestrator — syntax + import check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MCP dependencies
        run: |
          pip install --upgrade pip
          pip install -r mcp_requirements.txt

      - name: Syntax check mcp_orchestrator.py
        run: python -m py_compile mcp_orchestrator.py && echo "Syntax OK"

      - name: Import check
        run: |
          python -c "
          import ast, sys
          with open('mcp_orchestrator.py') as f:
              tree = ast.parse(f.read())
          print('AST parse OK — no syntax errors')
          "

  # ── Job 4: Security — never commit your .env ─────────────────────────────
  secrets-check:
    name: Secrets scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check .env is not exposing real secrets
        run: |
          if grep -rE "(sk-ant-[a-zA-Z0-9]+|ghp_[a-zA-Z0-9]+)" . \
            --include="*.py" --include="*.js" --include="*.ts" \
            --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir="saved_models"; then
            echo "WARNING: Possible hardcoded API key detected"
            exit 1
          else
            echo "No hardcoded secrets found"
          fi

      - name: Warn if .env contains real keys
        run: |
          if [ -f .env ]; then
            if grep -E "(sk-ant-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{20,})" .env; then
              echo "ERROR: Real API keys found in .env — remove from repo immediately"
              exit 1
            else
              echo ".env present but no live keys detected"
            fi
          fi
